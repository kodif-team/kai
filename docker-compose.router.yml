services:
  kai-router-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: kai-router
    restart: unless-stopped
    ports:
      - "${KAI_ROUTER_PORT}:8080"
    volumes:
      - kai-router-gguf:/models
    command:
      - -m
      - /models/${KAI_ROUTER_GGUF}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "2048"
      - --jinja
      - --threads
      - "10"
      - --parallel
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
    networks:
      - kai

  kai-router-pull:
    image: alpine:latest
    volumes:
      - kai-router-gguf:/models
    environment:
      KAI_ROUTER_HF_REPO: ${KAI_ROUTER_HF_REPO}
      KAI_ROUTER_GGUF: ${KAI_ROUTER_GGUF}
      KAI_ROUTER_MIN_BYTES: ${KAI_ROUTER_MIN_BYTES}
    command:
      - sh
      - -c
      - |
        set -e
        apk add -q curl
        if [ ! -f "/models/$${KAI_ROUTER_GGUF}" ]; then
          echo "Downloading $${KAI_ROUTER_GGUF} from $${KAI_ROUTER_HF_REPO}..."
          curl -fL -o "/models/$${KAI_ROUTER_GGUF}.tmp" \
            "https://huggingface.co/$${KAI_ROUTER_HF_REPO}/resolve/main/$${KAI_ROUTER_GGUF}"
          BYTES=$(wc -c < "/models/$${KAI_ROUTER_GGUF}.tmp")
          if [ "$${BYTES}" -lt "$${KAI_ROUTER_MIN_BYTES}" ]; then
            echo "Downloaded router model is too small ($${BYTES} bytes), expected >= $${KAI_ROUTER_MIN_BYTES}" >&2
            rm -f "/models/$${KAI_ROUTER_GGUF}.tmp"
            exit 1
          fi
          mv "/models/$${KAI_ROUTER_GGUF}.tmp" "/models/$${KAI_ROUTER_GGUF}"
        fi
        ls -lh /models/
    restart: "no"
    networks:
      - kai

  kai-compressor-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: kai-compressor
    restart: unless-stopped
    ports:
      - "${KAI_COMPRESSOR_PORT}:8081"
    volumes:
      - kai-compressor-gguf:/models
    command:
      - -m
      - /models/${KAI_COMPRESSOR_GGUF}
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --ctx-size
      - "4096"
      - --jinja
      - --threads
      - "10"
      - --parallel
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
    networks:
      - kai

  kai-compressor-pull:
    image: alpine:latest
    volumes:
      - kai-compressor-gguf:/models
    environment:
      KAI_COMPRESSOR_HF_REPO: ${KAI_COMPRESSOR_HF_REPO}
      KAI_COMPRESSOR_GGUF: ${KAI_COMPRESSOR_GGUF}
      KAI_COMPRESSOR_MIN_BYTES: ${KAI_COMPRESSOR_MIN_BYTES}
    command:
      - sh
      - -c
      - |
        set -e
        apk add -q curl
        if [ ! -f "/models/$${KAI_COMPRESSOR_GGUF}" ]; then
          echo "Downloading $${KAI_COMPRESSOR_GGUF} from $${KAI_COMPRESSOR_HF_REPO}..."
          curl -fL -o "/models/$${KAI_COMPRESSOR_GGUF}.tmp" \
            "https://huggingface.co/$${KAI_COMPRESSOR_HF_REPO}/resolve/main/$${KAI_COMPRESSOR_GGUF}"
          BYTES=$(wc -c < "/models/$${KAI_COMPRESSOR_GGUF}.tmp")
          if [ "$${BYTES}" -lt "$${KAI_COMPRESSOR_MIN_BYTES}" ]; then
            echo "Downloaded compressor model is too small ($${BYTES} bytes), expected >= $${KAI_COMPRESSOR_MIN_BYTES}" >&2
            rm -f "/models/$${KAI_COMPRESSOR_GGUF}.tmp"
            exit 1
          fi
          mv "/models/$${KAI_COMPRESSOR_GGUF}.tmp" "/models/$${KAI_COMPRESSOR_GGUF}"
        fi
        ls -lh /models/
    restart: "no"
    networks:
      - kai

networks:
  kai:
    driver: bridge

volumes:
  kai-router-gguf:
  kai-compressor-gguf:
