services:
  kai-router-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: kai-router
    restart: unless-stopped
    ports:
      - "${KAI_ROUTER_PORT}:8080"
    volumes:
      - kai-router-gguf:/models
    command:
      - -m
      - /models/LFM2-350M-Q4_0.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "2048"
      - --jinja
      - --threads
      - "10"
      - --parallel
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
    networks:
      - kai

  kai-router-pull:
    image: alpine:latest
    volumes:
      - kai-router-gguf:/models
    command:
      - sh
      - -c
      - |
        set -e
        apk add -q curl
        GGUF="LFM2-350M-Q4_0.gguf"
        HF_REPO="LiquidAI/LFM2-350M-GGUF"
        MIN_BYTES="100000000"
        if [ ! -f "/models/$${GGUF}" ]; then
          echo "Downloading $${GGUF} from $${HF_REPO}..."
          curl -fL -o "/models/$${GGUF}.tmp" \
            "https://huggingface.co/$${HF_REPO}/resolve/main/$${GGUF}"
          BYTES=$(wc -c < "/models/$${GGUF}.tmp")
          if [ "$${BYTES}" -lt "$${MIN_BYTES}" ]; then
            echo "Downloaded router model is too small ($${BYTES} bytes), expected >= $${MIN_BYTES}" >&2
            rm -f "/models/$${GGUF}.tmp"
            exit 1
          fi
          mv "/models/$${GGUF}.tmp" "/models/$${GGUF}"
        fi
        ls -lh /models/
    restart: "no"
    networks:
      - kai

  kai-compressor-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: kai-compressor
    restart: unless-stopped
    ports:
      - "${KAI_COMPRESSOR_PORT}:8081"
    volumes:
      - kai-compressor-gguf:/models
    command:
      - -m
      - /models/LFM2-350M-Q4_0.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --ctx-size
      - "4096"
      - --jinja
      - --threads
      - "10"
      - --parallel
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
    networks:
      - kai

  kai-compressor-pull:
    image: alpine:latest
    volumes:
      - kai-compressor-gguf:/models
    command:
      - sh
      - -c
      - |
        set -e
        apk add -q curl
        GGUF="LFM2-350M-Q4_0.gguf"
        HF_REPO="LiquidAI/LFM2-350M-GGUF"
        MIN_BYTES="100000000"
        if [ ! -f "/models/$${GGUF}" ]; then
          echo "Downloading $${GGUF} from $${HF_REPO}..."
          curl -fL -o "/models/$${GGUF}.tmp" \
            "https://huggingface.co/$${HF_REPO}/resolve/main/$${GGUF}"
          BYTES=$(wc -c < "/models/$${GGUF}.tmp")
          if [ "$${BYTES}" -lt "$${MIN_BYTES}" ]; then
            echo "Downloaded compressor model is too small ($${BYTES} bytes), expected >= $${MIN_BYTES}" >&2
            rm -f "/models/$${GGUF}.tmp"
            exit 1
          fi
          mv "/models/$${GGUF}.tmp" "/models/$${GGUF}"
        fi
        ls -lh /models/
    restart: "no"
    networks:
      - kai

networks:
  kai:
    driver: bridge

volumes:
  kai-router-gguf:
  kai-compressor-gguf:
